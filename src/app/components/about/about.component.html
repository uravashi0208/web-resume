<section class="about section-block" id="about">
  <div class="section-header">
    <span class="section-tag">About Me</span>
    <h2 class="section-title">Full-Stack Developer<br /><em>based in Poland</em></h2>
  </div>

  <div class="about-body">
    <div class="about-img-col">
      <div class="about-img-wrap">
        <img src="assets/img/profile.jpg" alt="Uravashiben Vagadiya" />
        <div class="exp-badge">
          <span class="exp-num">8+</span>
          <span class="exp-text">Years<br />Experience</span>
        </div>
      </div>
      <div class="social-links">
        <a
          href="https://www.linkedin.com/in/uravashibenvagadiya-978121171"
          target="_blank"
          class="social-btn"
        >
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="mailto:urvashiv210@gmail.com" class="social-btn">
          <i class="fas fa-envelope"></i>
        </a>
        <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
      </div>
    </div>

    <div class="about-text-col">
      <p class="about-bio">{{ profile.bio }}</p>
      <div class="education-cards">
        <h3 class="sub-heading">Education</h3>
        <div class="edu-card" *ngFor="let edu of education">
          <div class="edu-icon"><i class="fas fa-graduation-cap"></i></div>
          <div class="edu-info">
            <span class="edu-period">{{ edu.period }}</span>
            <h4 class="edu-degree">{{ edu.degree }} — {{ edu.field }}</h4>
            <p class="edu-inst">{{ edu.institution }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
